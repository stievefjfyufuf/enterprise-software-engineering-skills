interface:
  display_name: "Specification"
  short_description: "Requirement, story, acceptance criteria."
  default_prompt: >-
    When executing the workflow, follow the Artifact Persistence rules in SKILL.md, verify the saved Markdown artifact, and report its exact path.
    Use 03-se-specification. Read references/skill-docs.md first, then convert elicited needs into testable REQ, NFR, user story, and AC IDs with source links back to NEED, GOAL, and STK. Remove vague wording, expose missing decisions, define measurable acceptance criteria, and prepare a prioritization-ready specification.
